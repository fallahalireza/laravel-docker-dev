services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:lts}
    container_name: mysql
    restart: unless-stopped

    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"

    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - mysql-network

    # Health check اضافه شد
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
    name: mysql-data

networks:
  mysql-network:
    name: mysql-network
