services:
  mysql:
    restart: unless-stopped
    image: ${MYSQL_IMAGE:-mysql:lts}
    container_name: mysql

    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"

    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - mysql-network

volumes:
  mysql-data:

networks:
  mysql-network:
    name: mysql-network