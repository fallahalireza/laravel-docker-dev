services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7}
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - traefik-network

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./dynamic:/dynamic:ro

    command:
      # ── EntryPoints ──────────────────────────────────────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # ── Static TLS config ────────────────────────────────────────
      - "--providers.file.filename=/dynamic/tls.yaml"

      # ── Docker Provider ──────────────────────────────────────────
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      - "--providers.docker.watch=true"

      # ── API & Dashboard ──────────────────────────────────────────
      - "--api.dashboard=true"
      - "--api.insecure=true"

      # ── Observability ────────────────────────────────────────────
      - "--log.level=INFO"
      - "--accesslog=false"

      # ── پینگ health check ────────────────────────────────────────
      - "--ping=true"

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.rule=Host(`${TRAEFIK_DOMAIN:-traefik.localhost}`)"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.service=api@internal"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.tls=true"

networks:
  traefik-network:
    name: traefik-network
