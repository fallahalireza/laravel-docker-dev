services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:latest}

    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - traefik-network

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./dynamic:/dynamic:ro

    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach the static configuration tls.yaml file that contains the tls configuration settings
      - "--providers.file.filename=/dynamic/tls.yaml"

      # Providers 
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"

      # API & Dashboard 
      - "--api.dashboard=true"
      - "--api.insecure=true"

      # Observability 
      - "--log.level=INFO"
      - "--accesslog=false"

  # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      - "traefik.enable=true"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.rule=Host(`${TRAEFIK_DOMAIN:-traefik.localhost}`)"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.service=api@internal"
      - "traefik.http.routers.${ROUTER_NAME:-traefik}.tls=true"

networks:
  traefik-network:
    name: traefik-network
